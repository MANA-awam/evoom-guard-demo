# Gates every PR to this demo with the PUBLISHED EvoOM Guard action, pinned to
# the immutable commit behind v3.4.4 (never a mutable branch or tag reference).
name: EvoOM Guard
on: pull_request
permissions:
  contents: read
  pull-requests: write
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0                       # Guard needs the base commit to diff
          persist-credentials: false           # Never expose checkout credentials to candidate code
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install the demo's pinned test runner
        run: python -m pip install --disable-pip-version-check --no-input pytest==9.1.1
      - uses: EvoRiseKsa/EvoOM-Guard-m@47e0d3e02d0050d9fc72cac6fd4da481a42f8503 # v3.4.4
        with:
          test-command: "python -m pytest -q -o pythonpath=repo repo/tests"
          comment: "true"
